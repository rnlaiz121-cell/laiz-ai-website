<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laiz Official AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    header {
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #00d4ff;
      padding: 20px;
      text-align: center;
    }
    
    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 5px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .chat-box {
      background: rgba(20, 20, 50, 0.8);
      border: 2px solid #00d4ff;
      border-radius: 10px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .messages {
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(10, 10, 30, 0.5);
      border-radius: 5px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    
    .message {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      word-wrap: break-word;
    }
    
    .message.user {
      background: #00d4ff;
      color: #0a0e27;
      text-align: right;
      margin-left: 20%;
    }
    
    .message.ai {
      background: rgba(0, 212, 255, 0.2);
      color: #e0e0e0;
      margin-right: 20%;
      border-left: 3px solid #ffd700;
    }
    
    .input-area {
      display: flex;
      gap: 10px;
    }
    
    input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #00d4ff;
      color: #e0e0e0;
      padding: 12px;
      border-radius: 5px;
      font-size: 14px;
    }
    
    input:focus {
      outline: none;
      border-color: #ffd700;
    }
    
    button {
      background: linear-gradient(45deg, #00d4ff, #ffd700);
      border: none;
      color: #0a0e27;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    button:hover {
      transform: scale(1.05);
    }
    
    .info {
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid #ffd700;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
    }
    
    .info h3 {
      color: #ffd700;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚡ LAIZ OFFICIAL AI</div>
    <p style="color: #b0b0b0;">MLBB Accounts & Diamonds</p>
  </header>
  
  <div class="container">
    <div class="info">
      <h3>💎 Welcome to Laiz Official Store</h3>
      <p>Chat with AI for account selling, buying, and diamond top-ups</p>
    </div>
    
    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="message ai">👋 Hey! I'm LAIZ AI. Ask me about selling/buying MLBB accounts or getting diamonds!</div>
      </div>
      
      <div class="input-area">
        <input type="text" id="input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>
  
  <script>
    async function send() {
      const input = document.getElementById('input');
      const msg = input.value.trim();
      if (!msg) return;
      
      addMessage(msg, 'user');
      input.value = '';
      
      addMessage('⏳ Thinking...', 'ai');
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        
        const data = await res.json();
        
        const messages = document.getElementById('messages');
        messages.removeChild(messages.lastChild);
        
        addMessage(data.reply, 'ai');
      } catch (error) {
        addMessage('❌ Error. Try again.', 'ai');
      }
    }
    
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  </script>
</body>
</html>
